services:
  db:
    image: postgres:15-alpine
    container_name: cloud_cost_db
    restart: always
    environment:
      POSTGRES_DB: cloud_cost_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_cost_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cloud_cost_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/cloud_cost_db
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

volumes:
  postgres_data:
